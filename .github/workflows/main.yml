name: CI/CD Docker

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2 # Cập nhật version mới ổn định

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5 # Dùng action chính chủ sẽ nhanh và sạch hơn
        with:
          context: .
          file: .dockerFile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/nguyentandat:latest
            ${{ secrets.DOCKER_USERNAME }}/nguyentandat:${{ github.sha }}

      - name: Deploy to server
        # Thêm flag -S -s -v để xem chi tiết lỗi nếu thất bại
        run: |
          curl -v -X POST "${{ secrets.DEPLOY_URL }}" \
               -H "Content-Type: application/json" \
               --fail || exit 1
