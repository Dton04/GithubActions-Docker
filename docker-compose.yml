version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: .dockerFile
    container_name: nguyentandat-app
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    restart: unless-stopped
    networks:
      - spring-network

networks:
  spring-network:
    driver: bridge
